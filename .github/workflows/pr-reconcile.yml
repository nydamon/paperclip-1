name: PR Reconcile

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

jobs:
  reconcile:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      statuses: read
      checks: read
    steps:
      - name: Reconcile stale and merge-ready PRs
        uses: actions/github-script@v7
        with:
          script: |
            const issueKeyFor = (pr) => {
              const haystack = [pr.title || '', pr.body || '', pr.head?.ref || ''].join('\n');
              const match = haystack.match(/\bDLD-\d+\b/i);
              return match ? match[0].toUpperCase() : null;
            };

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const requiredChecks = ['verify', 'policy'];
            const mergedByKey = new Map();

            const closed = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: 'closed',
              per_page: 100,
            });

            for (const pr of closed) {
              if (!pr.merged_at) continue;
              const key = issueKeyFor(pr);
              if (!key) continue;
              const current = mergedByKey.get(key);
              if (!current || new Date(pr.merged_at) > new Date(current.merged_at)) {
                mergedByKey.set(key, pr);
              }
            }

            const openPrs = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: 'open',
              per_page: 100,
            });

            for (const pr of openPrs) {
              const fullPr = (await github.rest.pulls.get({
                owner,
                repo,
                pull_number: pr.number,
              })).data;

              const key = issueKeyFor(fullPr);
              const mergedReplacement = key ? mergedByKey.get(key) : null;
              if (
                mergedReplacement &&
                mergedReplacement.number !== pr.number &&
                (fullPr.mergeable_state === 'dirty' || fullPr.mergeable_state === 'unknown')
              ) {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: pr.number,
                  body: `Closing as superseded by merged PR #${mergedReplacement.number} for ${key}. This branch is stranded in a conflicting state.`,
                });
                await github.rest.pulls.update({
                  owner,
                  repo,
                  pull_number: pr.number,
                  state: 'closed',
                });
                console.log(`Closed superseded PR #${pr.number}`);
                continue;
              }

              const sha = fullPr.head.sha;
              const combined = (await github.rest.repos.getCombinedStatusForRef({
                owner,
                repo,
                ref: sha,
              })).data;
              const statusMap = {};
              for (const status of combined.statuses) statusMap[status.context] = status.state;
              const verdictStatus = combined.statuses.find((s) => s.context === 'ai-review/verdict');
              if (!verdictStatus || verdictStatus.state !== 'success') continue;

              const description = verdictStatus.description || '';
              const docsOnlyPass = description.includes('skipped for docs-only changes');
              if (description.includes('HIGH_RISK') || description.includes('HUMAN_REQUIRED') || description.includes('FAIL')) continue;
              if (!description.includes('PASS') && !docsOnlyPass) continue;

              const checks = (await github.rest.checks.listForRef({
                owner,
                repo,
                ref: sha,
              })).data.check_runs;
              for (const run of checks) {
                if (run.conclusion === 'success') statusMap[run.name] = 'success';
                else if (run.conclusion === 'skipped') statusMap[run.name] = 'skipped';
              }

              const missing = requiredChecks.filter((name) => statusMap[name] !== 'success');
              if (missing.length) continue;

              if (fullPr.mergeable_state === 'behind') {
                await github.rest.pulls.updateBranch({
                  owner,
                  repo,
                  pull_number: pr.number,
                });
                console.log(`Requested branch update for PR #${pr.number}`);
                continue;
              }

              if (fullPr.auto_merge) continue;
              if (['dirty', 'blocked', 'unknown'].includes(fullPr.mergeable_state || 'unknown')) continue;

              await github.graphql(
                `mutation EnableAutoMerge($pullRequestId: ID!) {
                  enablePullRequestAutoMerge(input: { pullRequestId: $pullRequestId, mergeMethod: SQUASH }) {
                    pullRequest { number }
                  }
                }`,
                { pullRequestId: fullPr.node_id },
              );
              console.log(`Enabled auto-merge for PR #${pr.number}`);
            }
