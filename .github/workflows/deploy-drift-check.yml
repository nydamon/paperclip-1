name: Deploy Drift Check

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

concurrency:
  group: deploy-drift-check
  cancel-in-progress: true

permissions:
  contents: read
  issues: write

jobs:
  drift-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          printf '%s\n' "${{ secrets.VULTR_SSH_PRIVATE_KEY }}" > "$HOME/.ssh/id_ed25519"
          chmod 600 "$HOME/.ssh/id_ed25519"
          printf '%s\n' "${{ secrets.VULTR_KNOWN_HOSTS }}" > "$HOME/.ssh/known_hosts"
          chmod 644 "$HOME/.ssh/known_hosts"

      - name: Resolve expected SHA
        id: expected-sha
        run: |
          set -euo pipefail
          expected_sha=$(git ls-remote origin refs/heads/master | awk '{print $1}')
          [ -n "$expected_sha" ] || {
            echo "Failed to resolve origin/master SHA" >&2
            exit 1
          }
          echo "sha=$expected_sha" >> "$GITHUB_OUTPUT"

      - name: Run drift check
        id: drift
        run: |
          set -euo pipefail
          chmod +x ./scripts/check-deploy-drift.sh
          ./scripts/check-deploy-drift.sh \
            --host "${{ secrets.VULTR_HOST }}" \
            --user "${{ secrets.VULTR_USER }}" \
            --expected-sha "${{ steps.expected-sha.outputs.sha }}" \
            --retries 20 \
            --retry-interval-seconds 30

      - name: Open or update drift alert issue on failure
        if: failure()
        uses: actions/github-script@v7
        env:
          EXPECTED_SHA: ${{ steps.expected-sha.outputs.sha }}
          WORKFLOW_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          script: |
            const title = 'ops: Deploy drift alert — master ahead of prod';
            const body = [
              'Automated alert from `deploy-drift-check.yml`.',
              '',
              `**Expected SHA (origin/master):** \`${process.env.EXPECTED_SHA}\``,
              `**Workflow run:** ${process.env.WORKFLOW_RUN_URL}`,
              '',
              'The drift check failed — either SSH to VPS is broken, the VPS is on',
              'an older image, or the container health probe failed. Investigate the',
              'workflow run log for the specific failure, then either:',
              '',
              '- Trigger `Deploy Vultr` manually once the root cause is fixed, or',
              '- Reply with a comment when the drift is resolved (the next',
              '  successful drift-check run will auto-close this issue).',
              '',
              'First observed at workflow run above. This issue is idempotent —',
              'if it already exists, subsequent failing runs append a comment',
              'rather than opening a duplicate.',
            ].join('\n');

            // Find an existing open drift-alert issue to avoid duplicates.
            const { data: issues } = await github.rest.search.issuesAndPullRequests({
              q: `repo:${context.repo.owner}/${context.repo.repo} is:issue is:open in:title "Deploy drift alert"`,
              per_page: 1,
            });

            if (issues.total_count > 0) {
              const existing = issues.items[0];
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: `Drift still failing — expected SHA \`${process.env.EXPECTED_SHA}\`. Run: ${process.env.WORKFLOW_RUN_URL}`,
              });
              console.log(`Appended to existing drift issue #${existing.number}`);
              return;
            }

            const { data: created } = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
            });
            console.log(`Created drift alert issue #${created.number}`);

      - name: Close drift alert on success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issues } = await github.rest.search.issuesAndPullRequests({
              q: `repo:${context.repo.owner}/${context.repo.repo} is:issue is:open in:title "Deploy drift alert"`,
              per_page: 5,
            });
            for (const issue of issues.items) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: 'Drift check passed on a subsequent run — auto-closing.',
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
              });
              console.log(`Auto-closed drift alert issue #${issue.number}`);
            }
